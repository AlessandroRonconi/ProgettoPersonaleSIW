<!DOCTYPE html>
<html>

<head>
        <title>HomePage</title>
        <link rel="stylesheet" th:href="@{/css/stile.css}" />
        <span th:if="${userDetails != null}">
                Sei loggato come: <b th:text="${userDetails.username}"></b>
        </span>
        <span th:if="${userDetails == null}">
                Non sei loggato
        </span>
</head>

<body>
        <h1>Home</h1>

        <h2>
                <a th:href="@{'/corsi'}">I nostri corsi</a>
        </h2>

        <h2>
                <a href="/staff">Il nostro staff</a>
        </h2>

        <h2>
                <a th:href="@{'/tipi_abbonamenti'}">Gli abbonamenti che offriamo</a>
        </h2>


        <h2>
                <a href="/login">Effettua il Login</a>
        </h2>

        <h2>
                <a href="/register">Registrati</a>
        </h2>

        <h2>
                <div sec:authorize="hasAnyAuthority('USER','ADMIN')">
                        <a th:href="@{'/utente/profilo'}">Pagina personale Utente</a>
                </div>
        </h2>

        <h2>
                <div sec:authorize="hasAnyAuthority('ADMIN')">
                        <a th:href="@{'/esercizi'}">Esercizi</a>
                </div>
        </h2>

        <h2>
                <div sec:authorize="hasAnyAuthority('ADMIN')">
                        <a th:href="@{/admin/schede}">Schede allenamento</a>
                </div>
        </h2>

        <h2>
                <div sec:authorize="hasAnyAuthority('ADMIN')">
                        <a th:href="@{/admin/elenco}">PT</a>
                </div>
        </h2>

        <header>
                <div th:if="${userDetails}">
                        <form th:action="@{/logout}" method="POST" style="display:inline;">
                                <button type="submit">Logout</button>
                        </form>
                </div>
        </header>

</body>

</html>
