	<h1>Login</h1>
	
	<p th:if="${errorMessage}" style="color: red;"><!--grazie a questo vedi l'errore passato come parametro da authcontroller-->

			<div>
				<span>Password:</span>
				<span><input name="password" type="password" required /></span>
			</div>

	</form>
	<div>
		<a th:href="@{/register}" th:text="Registrati">Registrati</a>
	</div>
