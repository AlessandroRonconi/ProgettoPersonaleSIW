<!DOCTYPE html>
<html>
<head>
    <title>Registrazione</title>
</head>
<body>

<h1>Registrazione</h1>

    <div th:if="${error}" style="color:red; margin-bottom: 10px;" th:text="${error}"></div> 

<form th:action="@{/register}" method="POST" th:object="${credentials}">
    
    <div>
        Username: <input type="text" th:field="*{username}" required />
        <span th:if="${#fields.hasErrors('username')}" 
                  th:errors="*{username}" 
                  style="color:red"></span>
    </div>
    
    <div>
        Password: <input type="password" th:field="*{password}" required />
        <span th:if="${#fields.hasErrors('password')}" 
                  th:errors="*{password}" 
                  style="color:red"></span>
    </div>
    
    <div>
        Nome: <input type="text" th:field="*{user.nome}" required />
        <span th:if="${#fields.hasErrors('user.nome')}" 
                  th:errors="*{user.nome}" 
                  style="color:red"></span>
    </div>

    <div>
        Cognome: <input type="text" th:field="*{user.cognome}" required />
        <span th:if="${#fields.hasErrors('user.cognome')}" 
                  th:errors="*{user.cognome}" 
                  style="color:red"></span>
    </div>

    <div>
        Data di nascita:<input type="date" th:field="*{user.dataDiNascita}" required />

        <span th:if="${#fields.hasErrors('user.dataDiNascita')}"
            th:errors="*{user.dataDiNascita}"
            style="color:red"></span>
    </div>

    <div>
        Email: <input type="email" th:field="*{user.email}" required />
        <span th:if="${#fields.hasErrors('user.email')}" 
                  th:errors="*{user.email}" 
                  style="color:red"></span>
    </div>

    <button type="submit">Registrati</button>

</form>

</body>
</html>
